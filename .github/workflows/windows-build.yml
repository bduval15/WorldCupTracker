name: Windows Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate
        run: npm test

      - name: Build Windows app
        run: npm run dist

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: world-cup-2026-live-windows
          path: |
            release/*.exe
            release/*.blockmap
